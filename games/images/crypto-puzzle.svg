<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="puzzleBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D1120;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#080B14;stop-opacity:1" />
    </linearGradient>
    <filter id="blockGlow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="lineGlow">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
  </defs>

  <rect width="400" height="300" fill="url(#puzzleBg)"/>

  <!-- Grid background -->
  <g stroke="#1A1F2E" stroke-width="1" opacity="0.4">
    <line x1="0" y1="50" x2="400" y2="50"/>
    <line x1="0" y1="100" x2="400" y2="100"/>
    <line x1="0" y1="150" x2="400" y2="150"/>
    <line x1="0" y1="200" x2="400" y2="200"/>
    <line x1="0" y1="250" x2="400" y2="250"/>
    <line x1="100" y1="0" x2="100" y2="300"/>
    <line x1="200" y1="0" x2="200" y2="300"/>
    <line x1="300" y1="0" x2="300" y2="300"/>
  </g>

  <!-- Glowing completion lines -->
  <line x1="50" y1="120" x2="350" y2="120" stroke="#FFD700" stroke-width="3" opacity="0.6" filter="url(#lineGlow)"/>
  <line x1="80" y1="200" x2="320" y2="200" stroke="#4FC3F7" stroke-width="2" opacity="0.5" filter="url(#lineGlow)"/>

  <!-- Block 1 - Orange Tetris -->
  <g filter="url(#blockGlow)">
    <rect x="50" y="60" width="40" height="40" fill="#FF6B35" opacity="0.85" rx="3"/>
    <rect x="50" y="60" width="40" height="40" fill="none" stroke="#FFD700" stroke-width="2" opacity="0.6" rx="3"/>
    <text x="70" y="92" font-size="20" fill="#FFD700" text-anchor="middle" font-weight="bold" opacity="0.7">₿</text>
  </g>

  <!-- Block 2 - Gold -->
  <g filter="url(#blockGlow)">
    <rect x="110" y="80" width="40" height="40" fill="#FFD700" opacity="0.85" rx="3"/>
    <rect x="110" y="80" width="40" height="40" fill="none" stroke="#FF6B35" stroke-width="2" opacity="0.6" rx="3"/>
    <text x="130" y="112" font-size="18" fill="#FF6B35" text-anchor="middle" font-weight="bold">◆</text>
  </g>

  <!-- Block 3 - Cyan -->
  <g filter="url(#blockGlow)">
    <rect x="170" y="100" width="40" height="40" fill="#4FC3F7" opacity="0.85" rx="3"/>
    <rect x="170" y="100" width="40" height="40" fill="none" stroke="#FFD700" stroke-width="2" opacity="0.6" rx="3"/>
    <text x="190" y="132" font-size="18" fill="#080B14" text-anchor="middle" font-weight="bold">◇</text>
  </g>

  <!-- Block 4 - Orange -->
  <g filter="url(#blockGlow)">
    <rect x="230" y="120" width="40" height="40" fill="#FF6B35" opacity="0.85" rx="3"/>
    <rect x="230" y="120" width="40" height="40" fill="none" stroke="#4FC3F7" stroke-width="2" opacity="0.6" rx="3"/>
    <text x="250" y="152" font-size="20" fill="#FFD700" text-anchor="middle" font-weight="bold">◆</text>
  </g>

  <!-- Block 5 - Gold -->
  <g filter="url(#blockGlow)">
    <rect x="290" y="140" width="40" height="40" fill="#FFD700" opacity="0.85" rx="3"/>
    <rect x="290" y="140" width="40" height="40" fill="none" stroke="#FF6B35" stroke-width="2" opacity="0.6" rx="3"/>
    <text x="310" y="172" font-size="18" fill="#FF6B35" text-anchor="middle" font-weight="bold">◎</text>
  </g>

  <!-- Falling block preview -->
  <g filter="url(#blockGlow)" opacity="0.7">
    <rect x="140" y="140" width="40" height="40" fill="#FF6B35" opacity="0.7" rx="3"/>
    <rect x="140" y="140" width="40" height="40" fill="none" stroke="#FFD700" stroke-width="2" opacity="0.5" rx="3" stroke-dasharray="5,5"/>
  </g>

  <!-- Crypto symbols scattered -->
  <text x="100" y="260" font-size="24" fill="#FFD700" opacity="0.3" text-anchor="middle">₿</text>
  <text x="200" y="270" font-size="20" fill="#4FC3F7" opacity="0.25" text-anchor="middle">◆</text>
  <text x="300" y="255" font-size="22" fill="#FF6B35" opacity="0.3" text-anchor="middle">◎</text>

  <!-- Title -->
  <text x="200" y="30" font-size="18" fill="#4FC3F7" text-anchor="middle" font-weight="bold" filter="url(#blockGlow)">CRYPTO PUZZLE</text>
</svg>