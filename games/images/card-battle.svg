<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="arenaGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D1120;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#080B14;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0A0D18;stop-opacity:1" />
    </linearGradient>
    <filter id="cardGlow">
      <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="energyGlow">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <radialGradient id="energyRadial" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#FF6B35;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#4FC3F7;stop-opacity:0.2" />
    </radialGradient>
  </defs>

  <rect width="400" height="300" fill="url(#arenaGradient)"/>

  <!-- Energy field in center -->
  <circle cx="200" cy="150" r="80" fill="url(#energyRadial)" filter="url(#energyGlow)"/>
  <circle cx="200" cy="150" r="70" fill="none" stroke="#FF6B35" stroke-width="1" opacity="0.4"/>
  <circle cx="200" cy="150" r="60" fill="none" stroke="#4FC3F7" stroke-width="1" opacity="0.3"/>

  <!-- Lightning bolts between cards -->
  <g stroke="#FFD700" stroke-width="2" opacity="0.7" filter="url(#energyGlow)">
    <line x1="140" y1="140" x2="160" y2="120"/>
    <line x1="160" y1="120" x2="180" y2="135"/>
    <line x1="180" y1="135" x2="200" y2="125"/>
  </g>
  <g stroke="#4FC3F7" stroke-width="1.5" opacity="0.5" filter="url(#energyGlow)">
    <line x1="260" y1="160" x2="240" y2="180"/>
    <line x1="240" y1="180" x2="220" y2="165"/>
    <line x1="220" y1="165" x2="200" y2="175"/>
  </g>

  <!-- Left card -->
  <g filter="url(#cardGlow)">
    <!-- Card body -->
    <rect x="40" y="80" width="90" height="130" fill="#FF6B35" opacity="0.85" rx="8"/>
    <rect x="40" y="80" width="90" height="130" fill="none" stroke="#FFD700" stroke-width="2" opacity="0.7" rx="8"/>

    <!-- Card glow aura -->
    <rect x="35" y="75" width="100" height="140" fill="none" stroke="#FF6B35" stroke-width="1" opacity="0.3" rx="10"/>

    <!-- Card details -->
    <text x="85" y="105" font-size="16" fill="#FFD700" text-anchor="middle" font-weight="bold">⚔</text>
    <text x="85" y="140" font-size="11" fill="#080B14" text-anchor="middle" font-weight="bold">ATTACK</text>
    <text x="85" y="200" font-size="12" fill="#FFD700" text-anchor="middle" font-weight="bold">100</text>
  </g>

  <!-- Right card -->
  <g filter="url(#cardGlow)">
    <!-- Card body -->
    <rect x="270" y="80" width="90" height="130" fill="#4FC3F7" opacity="0.85" rx="8"/>
    <rect x="270" y="80" width="90" height="130" fill="none" stroke="#FFD700" stroke-width="2" opacity="0.7" rx="8"/>

    <!-- Card glow aura -->
    <rect x="265" y="75" width="100" height="140" fill="none" stroke="#4FC3F7" stroke-width="1" opacity="0.3" rx="10"/>

    <!-- Card details -->
    <text x="315" y="105" font-size="16" fill="#080B14" text-anchor="middle" font-weight="bold">🛡</text>
    <text x="315" y="140" font-size="11" fill="#080B14" text-anchor="middle" font-weight="bold">DEFEND</text>
    <text x="315" y="200" font-size="12" fill="#FF6B35" text-anchor="middle" font-weight="bold">85</text>
  </g>

  <!-- Burst effect particles around center -->
  <circle cx="170" cy="120" r="3" fill="#FFD700" opacity="0.6" filter="url(#energyGlow)"/>
  <circle cx="190" cy="110" r="2" fill="#FF6B35" opacity="0.7" filter="url(#energyGlow)"/>
  <circle cx="210" cy="115" r="2.5" fill="#4FC3F7" opacity="0.6" filter="url(#energyGlow)"/>
  <circle cx="230" cy="125" r="2" fill="#FFD700" opacity="0.5" filter="url(#energyGlow)"/>
  <circle cx="175" cy="175" r="2.5" fill="#4FC3F7" opacity="0.6" filter="url(#energyGlow)"/>
  <circle cx="225" cy="180" r="2" fill="#FF6B35" opacity="0.7" filter="url(#energyGlow)"/>

  <!-- Title -->
  <text x="200" y="30" font-size="18" fill="#FFD700" text-anchor="middle" font-weight="bold" filter="url(#cardGlow)">CARD BATTLE</text>

  <!-- Versus text -->
  <text x="200" y="270" font-size="14" fill="#4FC3F7" text-anchor="middle" opacity="0.8">VS</text>
</svg>