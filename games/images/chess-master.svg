<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="chessBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D1120;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#080B14;stop-opacity:1" />
    </linearGradient>
    <filter id="chessPieceGlow">
      <feGaussianBlur stdDeviation="5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="neonGlow">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
    <pattern id="chessboard" x="0" y="0" width="50" height="50" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="50" height="50" fill="#080B14"/>
      <rect x="25" y="0" width="25" height="25" fill="#1A1F2E"/>
      <rect x="0" y="25" width="25" height="25" fill="#1A1F2E"/>
    </pattern>
  </defs>

  <rect width="400" height="300" fill="url(#chessBg)"/>

  <!-- Chessboard pattern background -->
  <rect width="400" height="300" fill="url(#chessboard)" opacity="0.6"/>

  <!-- Hex pattern overlay (blockchain theme) -->
  <g stroke="#4FC3F7" stroke-width="1" fill="none" opacity="0.15">
    <!-- Hex shapes -->
    <polygon points="100,80 120,70 140,80 130,100 110,100 90,100" stroke="#4FC3F7" stroke-width="1"/>
    <polygon points="200,120 220,110 240,120 230,140 210,140 190,140" stroke="#4FC3F7" stroke-width="1"/>
    <polygon points="280,70 300,60 320,70 310,90 290,90 270,90" stroke="#4FC3F7" stroke-width="1"/>
    <polygon points="150,200 170,190 190,200 180,220 160,220 140,220" stroke="#4FC3F7" stroke-width="1"/>
    <polygon points="250,160 270,150 290,160 280,180 260,180 240,180" stroke="#4FC3F7" stroke-width="1"/>
  </g>

  <!-- Neon glow lines forming blockchain pattern -->
  <g stroke="#FF6B35" stroke-width="1.5" opacity="0.4" filter="url(#neonGlow)">
    <line x1="100" y1="100" x2="150" y2="140"/>
    <line x1="150" y1="140" x2="200" y2="100"/>
    <line x1="200" y1="100" x2="250" y2="150"/>
    <line x1="250" y1="150" x2="300" y2="120"/>
    <line x1="100" y1="100" x2="200" y2="120"/>
    <line x1="200" y1="120" x2="280" y2="150"/>
  </g>

  <!-- White Queen -->
  <g filter="url(#chessPieceGlow)">
    <!-- Base -->
    <ellipse cx="140" cy="180" rx="15" ry="8" fill="#FFD700" opacity="0.9"/>

    <!-- Body -->
    <path d="M 130 172 Q 128 150 140 130 Q 152 150 150 172" fill="#FFD700" opacity="0.9"/>

    <!-- Head/Crown -->
    <circle cx="140" cy="120" r="10" fill="#FFD700" opacity="0.9"/>

    <!-- Crown points -->
    <polygon points="135,110 140,100 145,110" fill="#FF6B35" opacity="0.8"/>
    <polygon points="130,112 140,102 142,115" fill="#FF6B35" opacity="0.75"/>
    <polygon points="148,112 140,102 150,115" fill="#FF6B35" opacity="0.75"/>

    <!-- Glow effect -->
    <circle cx="140" cy="145" r="25" fill="none" stroke="#FFD700" stroke-width="1.5" opacity="0.4" filter="url(#neonGlow)"/>
  </g>

  <!-- Black King -->
  <g filter="url(#chessPieceGlow)">
    <!-- Base -->
    <ellipse cx="260" cy="180" rx="16" ry="8" fill="#4FC3F7" opacity="0.95"/>

    <!-- Body -->
    <path d="M 248 172 Q 246 145 260 120 Q 274 145 272 172" fill="#4FC3F7" opacity="0.95"/>

    <!-- Head -->
    <circle cx="260" cy="108" r="11" fill="#4FC3F7" opacity="0.95"/>

    <!-- Crown cross -->
    <line x1="260" y1="92" x2="260" y2="108" stroke="#FF6B35" stroke-width="2" opacity="0.8"/>
    <line x1="252" y1="100" x2="268" y2="100" stroke="#FF6B35" stroke-width="2" opacity="0.8"/>

    <!-- Glow effect -->
    <circle cx="260" cy="145" r="28" fill="none" stroke="#4FC3F7" stroke-width="1.5" opacity="0.4" filter="url(#neonGlow)"/>
  </g>

  <!-- Energy/lightning effect between pieces -->
  <g stroke="#FF6B35" stroke-width="2" opacity="0.6" filter="url(#neonGlow)">
    <line x1="155" y1="150" x2="180" y2="160"/>
    <line x1="180" y1="160" x2="200" y2="150"/>
    <line x1="200" y1="150" x2="220" y2="165"/>
    <line x1="220" y1="165" x2="245" y2="150"/>
  </g>

  <!-- Zig-zag energy -->
  <path d="M 155 145 L 170 155 L 180 145 L 200 160" stroke="#FFD700" stroke-width="1.5" fill="none" opacity="0.5" filter="url(#neonGlow)"/>

  <!-- Blockchain node circles -->
  <g filter="url(#neonGlow)">
    <circle cx="140" cy="145" r="4" fill="#FF6B35" opacity="0.8"/>
    <circle cx="200" cy="150" r="4" fill="#FFD700" opacity="0.75"/>
    <circle cx="260" cy="145" r="4" fill="#4FC3F7" opacity="0.8"/>
  </g>

  <!-- Surrounding glow auras for pieces -->
  <g opacity="0.3" filter="url(#neonGlow)">
    <circle cx="140" cy="150" r="50" fill="none" stroke="#FFD700" stroke-width="1"/>
    <circle cx="260" cy="150" r="50" fill="none" stroke="#4FC3F7" stroke-width="1"/>
  </g>

  <!-- Title -->
  <text x="200" y="30" font-size="18" fill="#4FC3F7" text-anchor="middle" font-weight="bold" filter="url(#chessPieceGlow)">CHESS MASTER</text>

  <!-- Subtitle -->
  <text x="200" y="260" font-size="12" fill="#FF6B35" text-anchor="middle" opacity="0.8" filter="url(#neonGlow)">ON-CHAIN PLAY</text>
</svg>