<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="spaceBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D1120;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#080B14;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="400" height="300" fill="url(#spaceBg)"/>

  <!-- Stars -->
  <circle cx="50" cy="40" r="1.5" fill="#4FC3F7" opacity="0.8"/>
  <circle cx="120" cy="30" r="1" fill="#FFD700" opacity="0.6"/>
  <circle cx="200" cy="20" r="1.5" fill="#4FC3F7" opacity="0.7"/>
  <circle cx="280" cy="50" r="1" fill="#FFD700" opacity="0.5"/>
  <circle cx="350" cy="35" r="1.5" fill="#4FC3F7" opacity="0.8"/>
  <circle cx="70" cy="80" r="1" fill="#FFD700" opacity="0.6"/>
  <circle cx="330" cy="90" r="1.5" fill="#4FC3F7" opacity="0.7"/>

  <!-- Speed lines background -->
  <line x1="10" y1="150" x2="100" y2="140" stroke="#FF6B35" stroke-width="2" opacity="0.3"/>
  <line x1="20" y1="160" x2="110" y2="155" stroke="#FF6B35" stroke-width="1.5" opacity="0.2"/>
  <line x1="15" y1="140" x2="90" y2="125" stroke="#FFD700" stroke-width="1" opacity="0.2"/>

  <!-- Running figure silhouette with motion -->
  <g filter="url(#glow)">
    <!-- Body -->
    <ellipse cx="200" cy="140" rx="18" ry="25" fill="#FF6B35" opacity="0.9"/>
    <!-- Head -->
    <circle cx="200" cy="110" r="12" fill="#FF6B35" opacity="0.9"/>
    <!-- Arms in motion -->
    <line x1="182" y1="125" x2="160" y2="110" stroke="#FF6B35" stroke-width="5" stroke-linecap="round" opacity="0.9"/>
    <line x1="218" y1="135" x2="240" y2="125" stroke="#FF6B35" stroke-width="5" stroke-linecap="round" opacity="0.9"/>
    <!-- Legs in motion -->
    <line x1="190" y1="165" x2="175" y2="200" stroke="#FF6B35" stroke-width="5" stroke-linecap="round" opacity="0.9"/>
    <line x1="210" y1="165" x2="225" y2="195" stroke="#FF6B35" stroke-width="5" stroke-linecap="round" opacity="0.9"/>
  </g>

  <!-- Speed lines in front of runner -->
  <line x1="280" y1="130" x2="350" y2="125" stroke="#FF6B35" stroke-width="3" opacity="0.6" filter="url(#glow)"/>
  <line x1="290" y1="145" x2="360" y2="142" stroke="#FF6B35" stroke-width="2" opacity="0.4"/>
  <line x1="285" y1="160" x2="350" y2="158" stroke="#FFD700" stroke-width="2" opacity="0.4"/>
  <line x1="295" y1="175" x2="360" y2="173" stroke="#FFD700" stroke-width="1.5" opacity="0.3"/>

  <!-- Floating coins -->
  <g filter="url(#softGlow)">
    <circle cx="320" cy="100" r="8" fill="#FFD700" opacity="0.8"/>
    <circle cx="320" cy="100" r="6" fill="#FFD700" opacity="0.3"/>
    <text x="320" y="105" font-size="10" fill="#FF6B35" text-anchor="middle" font-weight="bold">$</text>

    <circle cx="340" cy="140" r="7" fill="#FFD700" opacity="0.7"/>
    <circle cx="340" cy="140" r="5" fill="#FFD700" opacity="0.2"/>
    <text x="340" y="145" font-size="9" fill="#FF6B35" text-anchor="middle">$</text>

    <circle cx="300" cy="200" r="8" fill="#FFD700" opacity="0.75"/>
    <circle cx="300" cy="200" r="6" fill="#FFD700" opacity="0.25"/>
    <text x="300" y="205" font-size="10" fill="#FF6B35" text-anchor="middle" font-weight="bold">$</text>

    <circle cx="360" cy="220" r="6" fill="#FFD700" opacity="0.6"/>
    <circle cx="360" cy="220" r="4" fill="#FFD700" opacity="0.2"/>
    <text x="360" y="224" font-size="8" fill="#FF6B35" text-anchor="middle">$</text>
  </g>

  <!-- Text overlay -->
  <text x="200" y="280" font-size="18" fill="#FF6B35" text-anchor="middle" font-weight="bold" filter="url(#glow)">FUNS RUNNER</text>
</svg>